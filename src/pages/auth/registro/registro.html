<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta - Food Store</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <div class="card">
      <h1 class="titulo">Food Store</h1>
      <p class="subtitulo">Crear Cuenta</p>

      <form id="form-registro" novalidate>
        <div class="campo">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tucorreo@ejemplo.com"
            required
          />
        </div>
        <div class="campo">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Mínimo 6 caracteres"
            minlength="6"
            required
          />
        </div>
        <button type="submit" class="btn-ingresar">Registrarse</button>
      </form>

      <p class="registro">
        ¿Ya tenés cuenta? <a id="btn-login" href="#">Iniciá sesión</a>
      </p>
    </div>

    <script type="module" src="./registro.ts"></script>
  </body>
</html>
