<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración - Food Store</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/css/admin.css" />
  </head>
  <body>
    <header>
      <h1>⚙️ Panel de Administración</h1>
      <nav>
        <ul>
          <li><span id="user-info"></span></li>
          <li><a href="/src/pages/store/home/home.html">← Volver a la Tienda</a></li>
          <li><a id="btn-logout" href="#">Cerrar Sesión</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h2>Gestión de Productos</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Imagen</th><th>Nombre</th>
            <th>Categoría</th><th>Precio</th><th>Stock</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-productos"></tbody>
      </table>

      <details>
        <summary>✏️ Agregar Producto Rápido</summary>
        <form class="form-grupo" action="#">
          <div>
            <label for="nombre">Nombre del Producto:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Lomito Completo" required />
          </div>
          <div>
            <label for="precio">Precio:</label>
            <input type="number" id="precio" name="precio" placeholder="Ej: 15000" min="0" required />
          </div>
          <div>
            <label for="stock">Stock Inicial:</label>
            <input type="number" id="stock" name="stock" placeholder="Ej: 10" min="0" required />
          </div>
          <div>
            <label for="categoria">Categoría:</label>
            <select id="categoria" name="categoria" required>
              <option value="">Seleccione una opción...</option>
            </select>
          </div>
          <div>
            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" name="descripcion" placeholder="Ingresá los ingredientes..."></textarea>
          </div>
          <button type="submit">Guardar Producto</button>
        </form>
      </details>
    </main>

    <footer>
      <p>Panel de Administración - Food Store v2.0</p>
    </footer>

    <script type="module" src="./home.ts"></script>
  </body>
</html>
